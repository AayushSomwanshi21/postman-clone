version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postman_clone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  server:
    build: ./server
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db/postman_clone
      REDIS_URL: redis://redis:6379

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
